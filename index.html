<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom II - Total Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* This targets the iframe and forces it to fill the screen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* These properties help the browser scale the game pixels cleanly */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            z-index: 999;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <iframe 
            id="doom-frame"
            src="https://archive.org/embed/doom-2-play?ui=embed&scale=1" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
        
        <button id="fullscreen-btn" onclick="openFullscreen();">Go Fullscreen</button>
    </div>

    <script>
        function openFullscreen() {
            var elem = document.documentElement; // Scale the whole page
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }
            
            // Hide button after clicking to keep the screen clean
            document.getElementById('fullscreen-btn').style.display = 'none';
        }

        // Listen for the user exiting fullscreen (Esc key) to show the button again
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fullscreen-btn').style.display = 'block';
            }
        });
    </script>
</body>
</html>
