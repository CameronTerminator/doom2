<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom II - Fullscreen</title>
    <style>
        /* 1. Remove all borders and scrollbars from the page */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* 2. Container for the game */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 3. The Iframe fills the container completely */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 4. Floating Fullscreen Button */
        #fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 8px 15px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        #fullscreen-btn:hover {
            opacity: 1.0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="fullscreen-btn" onclick="openFullscreen();">GO FULLSCREEN</button>
        
        <iframe 
            id="doom-frame"
            src="https://archive.org/embed/doom-2-play?ui=embed" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true" 
            scrolling="no">
        </iframe>
    </div>

    <script>
        var elem = document.getElementById("game-container");
        
        function openFullscreen() {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari / Chrome OS */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
