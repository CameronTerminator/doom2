<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom II - True Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The container handles the aspect ratio */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Force the iframe to occupy all available space */
        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            /* Keeps the pixels sharp when stretched */
            image-rendering: pixelated; 
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            padding: 10px 15px;
            background: rgba(255, 0, 0, 0.6);
            color: white;
            border: 2px solid #fff;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        
        #fullscreen-btn:hover {
            background: red;
        }
    </style>
</head>
<body>

    <div id="container">
        <button id="fullscreen-btn" onclick="goTrueFullscreen()">GO FULLSCREEN</button>
        <iframe 
            id="game-frame"
            src="https://archive.org/embed/doom-2-play?ui=embed&scale=2" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
    </div>

    <script>
        function goTrueFullscreen() {
            const container = document.getElementById('container');
            
            // 1. Put the browser into hardware fullscreen mode
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen(); // For Chrome OS
            }

            // 2. Hide the button so it doesn't block the game UI
            document.getElementById('fullscreen-btn').style.display = 'none';
        }

        // Show the button again if you exit fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fullscreen-btn').style.display = 'block';
            }
        });
    </script>
</body>
</html>
